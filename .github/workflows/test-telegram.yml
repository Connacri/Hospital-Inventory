name: Test Telegram

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check secrets
        run: |
          if [ -z "${{ secrets.TELEGRAM_TOKEN }}" ]; then
            echo "❌ TELEGRAM_TOKEN non défini"
            exit 1
          fi
          if [ -z "${{ secrets.TELEGRAM_CHAT_ID }}" ]; then
            echo "❌ TELEGRAM_CHAT_ID non défini"
            exit 1
          fi
          echo "✅ Les secrets sont définis"

      - name: Send Test Message to Telegram
        run: |
          echo "📤 Envoi du message de test..."

RESPONSE=\( (curl -s -X POST "https://api.telegram.org/bot \){TELEGRAM_TOKEN}/sendMessage" \
  -d "chat_id=${TELEGRAM_CHAT_ID}" \
  -d "text=🧪 Test de notification Telegram - $(date)" \
  -d "parse_mode=HTML")

echo "Réponse: $RESPONSE"

if echo "$RESPONSE" | grep -q '"ok":true'; then
  echo "✅ Message envoyé avec succès!"
else
  echo "❌ Erreur lors de l'envoi"
  echo "$RESPONSE"
  exit 1
fi