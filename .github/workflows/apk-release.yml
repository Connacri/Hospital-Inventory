>name: Build APK & Auto Release with QR
permissions:
  contents: write   # permet de créer des releases et d’uploader des fichiers
on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout du code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Setup Flutter version exacte
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.5'
          channel: stable

      # 3️⃣ Cache dépendances Flutter & Gradle
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ~/.gradle/caches
          key: ${{ runner.os }}-flutter-${{ hashFiles('**/pubspec.lock') }}

      # 4️⃣ Installer uniquement les dépendances manquantes ou mises à jour
      - name: Install Flutter dependencies
        run: flutter pub get

      # 5️⃣ Détecter la dernière release et incrémenter le patch
      - name: Get latest tag
        id: tag
        run: |
          git fetch --tags
          TAG=$(git tag --sort=-v:refname | head -n 1)
          echo "Latest tag: $TAG"
          if [ -z "$TAG" ]; then
            echo "NEW_TAG=v1.0.0+1" >> $GITHUB_ENV
          else
            # Extraire la partie build après '+'
            BUILD=$(echo $TAG | awk -F+ '{print $2}')
            BUILD=$((BUILD+1))
            BASE=$(echo $TAG | awk -F+ '{print $1}')
            echo "NEW_TAG=${BASE}+${BUILD}" >> $GITHUB_ENV
            echo "New tag: $NEW_TAG"
          fi
      # 6️⃣ Build APK release
      - name: Build APK
  run: flutter build apk --release --build-name=$(echo $NEW_TAG | cut -d+ -f1 | sed 's/v//') --build-number=$(echo $NEW_TAG | cut -d+ -f2)

      # 7️⃣ Installer qrencode pour générer le QR code
      - name: Install QR tool
        run: sudo apt-get update && sudo apt-get install -y qrencode

      # 8️⃣ Générer QR code et préparer APK
      - name: Generate QR code and move APK
        run: |
          mkdir -p output
          RELEASE_URL="https://github.com/Connacri/Hospital-Inventory/releases/latest/download/app-${{ env.NEW_TAG }}.apk"
          qrencode -o output/qr-${{ env.NEW_TAG }}.png "$RELEASE_URL"
          cp build/app/outputs/flutter-apk/app-release.apk output/app-${{ env.NEW_TAG }}.apk

      # 9️⃣ Créer Release GitHub avec APK + QR code
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.NEW_TAG }}
          name: Release ${{ env.NEW_TAG }}
          files: |
            output/app-${{ env.NEW_TAG }}.apk
            output/qr-${{ env.NEW_TAG }}.png
        env:
          GITHUB_TOKEN: ${{ secrets.MY_PAT }}   # Utilise ton token personnel